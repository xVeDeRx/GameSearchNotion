<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Game</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    color: #f0f0f0;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* Setup screen */
  #setup {
    width: 100%;
    max-width: 420px;
    background: #111;
    padding: 28px;
    border-radius: 12px;
  }

  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: #e8ff47;
    margin-bottom: 24px;
    line-height: 1;
  }

  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 5px;
  }

  input, select {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #222;
    color: #f0f0f0;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    outline: none;
    transition: border-color .2s;
  }

  input:focus, select:focus { border-color: #e8ff47; }
  input::placeholder { color: #444; }

  .btn {
    width: 100%;
    background: #e8ff47;
    color: #000;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: .06em;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .15s;
  }

  .btn:hover { opacity: .88; }

  #error-msg { font-size: 12px; color: #ff6b6b; margin-top: 8px; min-height: 16px; }

  /* Widget screen */
  #widget {
    display: none;
    width: 100%;
    max-width: 420px;
  }

  .w-tag {
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 14px;
    text-align: center;
  }

  .w-cover {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
    background: #111;
    cursor: pointer;
  }

  .w-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .3s ease;
  }

  .w-cover:hover img { transform: scale(1.02); }

  .w-cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: #222;
    background: #111;
  }

  .w-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 8vw, 52px);
    line-height: 1;
    color: #f0f0f0;
    margin-bottom: 6px;
    text-align: center;
    text-decoration: none;
    display: block;
    cursor: pointer;
    transition: color .2s;
  }

  .w-name:hover { color: #e8ff47; }

  .w-system {
    font-size: 14px;
    color: #888;
    letter-spacing: .04em;
    text-align: center;
    margin-bottom: 18px;
    min-height: 20px;
  }

  .w-system span { color: #e8ff47; }

  .w-hint {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #333;
    text-align: center;
    cursor: pointer;
  }

  .w-hint:hover { color: #555; }

  .shimmer {
    background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }

  .fade-in { animation: fadeIn .5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .settings-btn {
    position: fixed;
    bottom: 14px;
    right: 14px;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #222;
    cursor: pointer;
    background: none;
    border: none;
    transition: color .2s;
  }

  .settings-btn:hover { color: #555; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1 class="setup-title">Random<br>Game</h1>

  <div class="field">
    <label>Notion API Key</label>
    <input type="password" id="api-key" placeholder="secret_xxxxxxxxxxxx">
  </div>

  <div class="field">
    <label>Database ID</label>
    <input type="text" id="db-id" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
  </div>

  <div class="field">
    <label>Refresh mode</label>
    <select id="refresh-mode">
      <option value="always">Every page load</option>
      <option value="daily">Once per day</option>
      <option value="weekly">Once per week</option>
    </select>
  </div>

  <div id="error-msg"></div>
  <button class="btn" onclick="saveAndLoad()">Load Widget →</button>
</div>

<!-- WIDGET -->
<div id="widget">
  <p class="w-tag" id="w-tag">🎮 Random Game</p>
  <div class="w-cover" id="w-cover" onclick="reroll()">
    <div class="w-cover-placeholder">?</div>
  </div>
  <a class="w-name" id="w-name" href="#" target="_blank">—</a>
  <div class="w-system" id="w-system"></div>
  <p class="w-hint" onclick="reroll()">↻ tap to reroll</p>
</div>

<button class="settings-btn" id="settings-btn" style="display:none" onclick="showSetup()">⚙ settings</button>

<script>
const PROXY = "https://corsproxy.io/?url=";
function notionUrl(p) { return PROXY + encodeURIComponent("https://api.notion.com/v1" + p); }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
function load(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e){ return null; } }
function getConfig() { return load("ngw_config") || {}; }
function saveConfig(c) { save("ngw_config", c); }

function getCachedGame(mode) {
  if (mode === "always") return null;
  const c = load("ngw_cache");
  if (!c) return null;
  const age = Date.now() - c.ts;
  if (mode === "daily" && age < 86400000) return c.game;
  if (mode === "weekly" && age < 604800000) return c.game;
  return null;
}
function setCachedGame(game) { save("ngw_cache", { ts: Date.now(), game }); }

async function fetchAllGames(apiKey, dbId) {
  let games = [], cursor, tries = 0;
  while (true) {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await fetch(notionUrl(`/databases/${dbId}/query`), {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + apiKey,
        "Notion-Version": "2022-06-28",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || "API error " + res.status);
    }
    const data = await res.json();
    games = games.concat(data.results);
    if (!data.has_more || ++tries > 10) break;
    cursor = data.next_cursor;
  }
  return games;
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function extractTitle(page) {
  const props = page.properties;
  if (props["Game"]?.type === "title") return props["Game"].title.map(t => t.plain_text).join("") || "";
  for (const key of Object.keys(props)) {
    if (props[key].type === "title") return props[key].title.map(t => t.plain_text).join("") || "";
  }
  return "Unknown";
}

function extractSystem(page) {
  // Try all common property types for "Systeem"
  const prop = page.properties["Systeem"];
  if (!prop) {
    // Log available properties to help debug
    console.log("Available properties:", Object.keys(page.properties));
    return "";
  }
  console.log("Systeem prop type:", prop.type, prop);
  if (prop.type === "select") return prop.select?.name || "";
  if (prop.type === "multi_select") return prop.multi_select.map(s => s.name).join(", ");
  if (prop.type === "rich_text") return prop.rich_text.map(t => t.plain_text).join("") || "";
  if (prop.type === "title") return prop.title.map(t => t.plain_text).join("") || "";
  if (prop.type === "formula") return prop.formula?.string || prop.formula?.number?.toString() || "";
  if (prop.type === "rollup") return "";
  return "";
}

function extractCover(page) {
  if (!page.cover) return null;
  if (page.cover.type === "external") return page.cover.external.url;
  if (page.cover.type === "file") return page.cover.file.url;
  return null;
}

function renderGame(game, config) {
  const name   = extractTitle(game);
  const system = extractSystem(game);
  const cover  = extractCover(game);
  const url    = game.url || "#";

  // Cover
  const coverEl = document.getElementById("w-cover");
  coverEl.classList.remove("fade-in");
  void coverEl.offsetWidth;
  coverEl.innerHTML = "";
  if (cover) {
    const img = document.createElement("img");
    img.src = cover;
    img.alt = name;
    img.onerror = () => { coverEl.innerHTML = `<div class="w-cover-placeholder">${name[0] || "?"}</div>`; };
    coverEl.appendChild(img);
  } else {
    coverEl.innerHTML = `<div class="w-cover-placeholder">${name[0] || "?"}</div>`;
  }
  coverEl.classList.add("fade-in");

  // Name — clicking opens Notion page
  const nameEl = document.getElementById("w-name");
  nameEl.classList.remove("fade-in");
  void nameEl.offsetWidth;
  nameEl.textContent = name;
  nameEl.href = url;
  nameEl.classList.add("fade-in");

  // System
  const sysEl = document.getElementById("w-system");
  if (system) {
    sysEl.innerHTML = `(<span>${system}</span>)`;
  } else {
    sysEl.innerHTML = "";
  }

  // Tag
  const mode = config.refreshMode;
  document.getElementById("w-tag").textContent =
    mode === "daily"  ? "🎮 Game of the Day" :
    mode === "weekly" ? "🎮 Game of the Week" :
                        "🎮 Random Game";
}

async function loadWidget(config, forceReroll) {
  document.getElementById("setup").style.display = "none";
  document.getElementById("widget").style.display = "block";
  document.getElementById("settings-btn").style.display = "block";

  if (!forceReroll) {
    const cached = getCachedGame(config.refreshMode);
    if (cached) { renderGame(cached, config); return; }
  }

  document.getElementById("w-name").textContent = "Loading...";
  document.getElementById("w-system").innerHTML = "";
  document.getElementById("w-cover").innerHTML =
    `<div class="w-cover-placeholder shimmer" style="width:100%;height:100%"></div>`;

  try {
    const games = await fetchAllGames(config.apiKey, config.dbId);
    if (!games.length) throw new Error("No games found.");
    const game = pickRandom(games);
    setCachedGame(game);
    renderGame(game, config);
  } catch (err) {
    document.getElementById("w-name").textContent = "Error";
    document.getElementById("w-system").innerHTML =
      `<span style="color:#ff6b6b;font-size:12px">${err.message}</span>`;
  }
}

async function reroll() { await loadWidget(getConfig(), true); }

function showSetup() {
  const c = getConfig();
  document.getElementById("api-key").value = c.apiKey || "";
  document.getElementById("db-id").value = c.dbId || "";
  document.getElementById("refresh-mode").value = c.refreshMode || "always";
  document.getElementById("widget").style.display = "none";
  document.getElementById("settings-btn").style.display = "none";
  document.getElementById("setup").style.display = "block";
}

async function saveAndLoad() {
  const apiKey      = document.getElementById("api-key").value.trim();
  const dbId        = document.getElementById("db-id").value.trim();
  const refreshMode = document.getElementById("refresh-mode").value;
  const errEl       = document.getElementById("error-msg");
  errEl.textContent = "";
  if (!apiKey || !dbId) { errEl.textContent = "Both fields are required."; return; }
  const config = { apiKey, dbId, refreshMode };
  saveConfig(config);
  await loadWidget(config, true);
}

window.addEventListener("DOMContentLoaded", () => {
  const config = getConfig();
  if (config.apiKey && config.dbId) loadWidget(config, false);
});
</script>
</body>
</html>
