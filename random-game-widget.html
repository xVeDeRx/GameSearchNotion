<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Game</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #666;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  #setup { width: 100%; max-width: 460px; }

  .setup-label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }

  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 56px);
    line-height: 1;
    color: var(--accent);
    margin-bottom: 28px;
  }

  .field { margin-bottom: 16px; }

  label { display: block; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }

  input, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    outline: none;
    transition: border-color .2s;
  }

  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .hint { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.5; }
  .hint a { color: var(--accent); text-decoration: none; }

  .btn {
    width: 100%;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: .06em;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .15s;
  }

  .btn:hover { opacity: .9; }

  #error-msg { font-size: 13px; color: #ff6b6b; margin-top: 10px; min-height: 18px; }

  #debug {
    display: none;
    width: 100%;
    max-width: 460px;
  }

  .debug-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .debug-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

  .prop-list { list-style: none; margin-bottom: 24px; }

  .prop-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    gap: 12px;
  }

  .prop-name { font-size: 14px; font-weight: 500; }

  .prop-type {
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--bg);
    padding: 3px 8px;
    border-radius: 12px;
    white-space: nowrap;
  }

  .prop-type.title { color: var(--accent); border: 1px solid var(--accent); }

  .btn-back {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 11px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color .2s;
  }

  .btn-back:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div id="setup">
  <p class="setup-label">Notion Widget — Debug Mode</p>
  <h1 class="setup-title">Find Your<br>Properties</h1>

  <div class="field">
    <label>Notion API Key</label>
    <input type="password" id="api-key" placeholder="secret_xxxxxxxxxxxx">
  </div>

  <div class="field">
    <label>Database ID</label>
    <input type="text" id="db-id" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
  </div>

  <div id="error-msg"></div>
  <button class="btn" onclick="fetchProps()">Show My Properties →</button>
</div>

<div id="debug">
  <p class="setup-label">Your database properties</p>
  <h2 class="debug-title">Pick Your<br>Name Field</h2>
  <p class="debug-sub">The one highlighted in <span style="color:var(--accent)">yellow</span> is the <b>title</b> type — that's most likely your game name field. Tell me its exact name and I'll update the widget!</p>
  <ul class="prop-list" id="prop-list"></ul>
  <button class="btn-back" onclick="goBack()">← Back</button>
</div>

<script>
const PROXY = "https://corsproxy.io/?url=";

function notionUrl(path) {
  return PROXY + encodeURIComponent("https://api.notion.com/v1" + path);
}

async function fetchProps() {
  const apiKey = document.getElementById("api-key").value.trim();
  const dbId   = document.getElementById("db-id").value.trim();
  const errEl  = document.getElementById("error-msg");
  errEl.textContent = "";

  if (!apiKey || !dbId) { errEl.textContent = "Both fields are required."; return; }

  errEl.textContent = "Loading...";
  errEl.style.color = "var(--muted)";

  try {
    const res = await fetch(notionUrl(`/databases/${dbId}`), {
      headers: {
        "Authorization": "Bearer " + apiKey,
        "Notion-Version": "2022-06-28"
      }
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || "API error " + res.status);
    }

    const data = await res.json();
    const props = data.properties;

    const list = document.getElementById("prop-list");
    list.innerHTML = "";

    Object.entries(props).forEach(([name, prop]) => {
      const li = document.createElement("li");
      li.className = "prop-item";
      li.innerHTML = `
        <span class="prop-name">${name}</span>
        <span class="prop-type ${prop.type === 'title' ? 'title' : ''}">${prop.type}</span>
      `;
      list.appendChild(li);
    });

    document.getElementById("setup").style.display = "none";
    document.getElementById("debug").style.display = "block";

  } catch(err) {
    errEl.textContent = err.message;
    errEl.style.color = "#ff6b6b";
  }
}

function goBack() {
  document.getElementById("debug").style.display = "none";
  document.getElementById("setup").style.display = "block";
}
</script>
</body>
</html>
