<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: #191919;
    padding: 20px;
    color: #e3e3e3;
  }

  input {
    width: 100%;
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.88rem;
    border: 1.5px solid #333;
    border-radius: 6px;
    outline: none;
    color: #e3e3e3;
    background: #252525;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }

  input:focus { border-color: #555; }
  input::placeholder { color: #555; }

  .status {
    font-size: 0.7rem;
    color: #555;
    margin-bottom: 10px;
    min-height: 16px;
  }

  .status.error { color: #e05555; }

  .results { display: flex; flex-direction: column; gap: 6px; }

  a.result {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border: 1px solid #2e2e2e;
    border-radius: 6px;
    text-decoration: none;
    color: #e3e3e3;
    font-size: 0.84rem;
    background: #252525;
    transition: border-color 0.12s, background 0.12s;
    animation: fadeIn 0.15s ease both;
  }

  a.result:hover { border-color: #555; background: #2e2e2e; }

  .arrow { color: #444; font-size: 0.8rem; }
  a.result:hover .arrow { color: #aaa; }

  .empty {
    font-size: 0.78rem;
    color: #555;
    padding: 12px 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<input type="text" id="q" placeholder="Search games…" oninput="onInput()" autocomplete="off"/>
<div class="status" id="status"></div>
<div class="results" id="results"></div>

<script>
  let timer = null;

  function onInput() {
    clearTimeout(timer);
    timer = setTimeout(search, 300);
  }

  async function search() {
    const q = document.getElementById('q').value.trim();
    const status  = document.getElementById('status');
    const results = document.getElementById('results');

    if (!q) { status.textContent = ''; results.innerHTML = ''; return; }

    status.textContent = 'Searching…';
    status.className = 'status';
    results.innerHTML = '';

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q })
      });

      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error('Function not reachable — check deployment');
      }

      if (!res.ok) throw new Error(data.message || data.error || `Error ${res.status}`);

      const pages = data.results || [];

      if (pages.length === 0) {
        status.textContent = '';
        results.innerHTML = `<div class="empty">No results for "${q}"</div>`;
        return;
      }

      status.textContent = `${pages.length} result${pages.length !== 1 ? 's' : ''}`;

      results.innerHTML = pages.map((page, i) => {
        const title = page.properties?.Game?.title?.map(t => t.plain_text).join('') || '(Untitled)';
        const url   = page.url || '#';
        return `<a class="result" href="${url}" target="_blank" rel="noopener" style="animation-delay:${i*0.03}s">
          <span>${esc(title)}</span>
          <span class="arrow">↗</span>
        </a>`;
      }).join('');

    } catch (e) {
      status.textContent = `Error: ${e.message}`;
      status.className = 'status error';
    }
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
